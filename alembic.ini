[alembic]
# A name for the alembic repository
# repository = myrepository

# The directory where alembic will store migration scripts
script_location = alembic

# The name of the migration file template
# file_template = %%(rev)s_%%(slug)s

# The database URL
# This is read from the environment in env.py
sqlalchemy.url = postgresql+asyncpg://user:password@postgres:5432/pa_workflow_db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
